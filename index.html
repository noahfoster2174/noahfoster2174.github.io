<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noah Foster</title>
  <meta name="description" content="Noah Foster — New York." />
  <meta property="og:title" content="Noah Foster" />
  <meta property="og:description" content="New York." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://noahfoster2174.github.io" />
  <meta property="og:image" content="https://noahfoster2174.github.io/assets/og.png" />
  <meta property="og:site_name" content="Noah Foster" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%232D6A4F'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='14' fill='white'>NF</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #2D6A4F;
      --text: #1A1A1A;
      --muted: #5E6E5E;
      --border: #D5DCD5;
      --bg: #F7F6F1;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card { text-align: center; padding: 2rem; }

    h1 {
      font-family: 'Spectral', serif;
      font-size: clamp(2.8rem, 8vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
    }
    h1 span { display: inline-block; border-bottom: 4px solid var(--accent); padding-bottom: 6px; }

    nav {
      margin-top: 2.25rem;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1rem 1.75rem;
    }
    nav a {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    nav a:hover { color: var(--accent); }
    nav a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 2px; }

    .card { opacity: 0; transform: translateY(16px); animation: reveal 0.6s ease 0.1s forwards; }
    @keyframes reveal { to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) { .card { animation: none; opacity: 1; transform: none; } }

    /* ── Page transition curtain ── */
    .curtain { position: fixed; inset: 0; background: var(--accent); z-index: 9999; transform: translateY(-100%); pointer-events: none; }
    .curtain.enter { animation: curtainEnter 0.45s cubic-bezier(0.77,0,0.18,1) forwards; }
    .curtain.exit  { animation: curtainExit  0.35s cubic-bezier(0.77,0,0.18,1) forwards; pointer-events: all; }
    @keyframes curtainEnter { from { transform: translateY(0); } to { transform: translateY(-100%); } }
    @keyframes curtainExit  { from { transform: translateY(-100%); } to { transform: translateY(0); } }
  </style>
</head>
<body>

  <main class="card">
    <h1><span>Noah Foster</span></h1>
    <nav aria-label="Main">
      <a href="projects.html">Projects</a>
      <a href="feed.html">Feed</a>
      <a href="about.html">About</a>
      <a href="https://github.com/noahfoster2174" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a href="https://www.linkedin.com/in/noahbfoster/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a href="mailto:noahfoster6@gmail.com">Email</a>
    </nav>
  </main>

  <div class="curtain" id="curtain"></div>

  <noscript><style>.card { animation: none; opacity: 1; transform: none; }</style></noscript>
  <script>
    const curtain = document.getElementById('curtain');
    if (curtain) {
      curtain.classList.add('enter');
      document.querySelectorAll('a[href]').forEach(link => {
        const href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
        link.addEventListener('click', e => {
          e.preventDefault();
          curtain.classList.remove('enter');
          curtain.classList.add('exit');
          setTimeout(() => { window.location.href = href; }, 350);
        });
      });
    }
  </script>
</body>
</html>
