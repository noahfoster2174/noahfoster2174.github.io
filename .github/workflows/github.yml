name: Fetch GitHub Activity

on:
  schedule:
    - cron: '45 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Build github.json from recent authored commits
        run: python3 scripts/build_github_json.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github.json
          git diff --cached --quiet || git commit -m "chore: update github activity data"
          git pull --rebase origin master
          git push
